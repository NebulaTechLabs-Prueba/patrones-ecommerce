name: Deploy demo a GitHub Pages

# El deploy SOLO ocurre desde main. El trabajo vive en dev; dev -> main dispara esto.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez; cancela el anterior si entra uno nuevo.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      # La logica que cuesta plata (precio, tasa, promos, disponibilidad) gatea el deploy.
      - name: Correr tests
        run: npm test

      - name: Build (export estatico)
        run: npm run build
        env:
          # Slug del repo en Pages. Si el repo NO se llama patrones-ecommerce,
          # cambiar SOLO esta linea para que calce el basePath.
          NEXT_PUBLIC_BASE_PATH: /patrones-ecommerce

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
